apiVersion: apps/v1
kind: Deployment
metadata:
  name: quali-fit
  namespace: quali-fit
  labels:
    app: quali-fit
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite file in RWO PVC — never run 2 pods at once
  selector:
    matchLabels:
      app: quali-fit
  template:
    metadata:
      labels:
        app: quali-fit
    spec:
      containers:
        - name: app
          image: quali-fit:__IMAGE_TAG__  # deploy.sh substitutes the per-commit tag at apply time
          imagePullPolicy: IfNotPresent  # image is imported into k3s containerd, not pulled
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quali-fit-data
